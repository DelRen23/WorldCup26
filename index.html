<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorldPack 26</title>

  <style>

    body {
      background: #121212;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 30px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 30px;
    }

    button {
      background: gold;
      color: black;
      border: none;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 22px;
      cursor: pointer;
      font-weight: bold;
    }

    #result {
      margin-top: 40px;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 220px;
      height: 320px;
      border-radius: 20px;
      padding: 20px;
      background: linear-gradient(180deg, #2a2a2a, #111);
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .legendary {
      border: 4px solid gold;
    }

    .epic {
      border: 4px solid purple;
    }

    .rare {
      border: 4px solid cyan;
    }

    .common {
      border: 4px solid gray;
    }

    .rating {
      font-size: 60px;
      font-weight: bold;
      margin-top: 20px;
    }

    .name {
      font-size: 28px;
      margin-top: 20px;
      font-weight: bold;
    }

    .nation {
      margin-top: 20px;
      font-size: 22px;
    }

    .rarity {
      margin-top: 20px;
      font-size: 20px;
    }

  </style>

</head>

<body>

  <h1>🌍 WorldPack 26</h1>

  <button onclick="openPack()">
    Ouvrir un pack
  </button>

  <div id="result"></div>

  <script src="script.js"></script>

</body>

</html>
